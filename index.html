<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>taskflow-project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Taskflow</h1>
    <p>Gestor de tareas</p>

    <main>

        <section>
            <h2>lista de tareas</h2>
            <section class="task-list">
                <div class="task-card">
                  <h3 class="task-title">Hacer mis practicas</h3>
                  <span class="task-category">casa</span>
                  <span class="task-priority high">Alta</span>
                </div>
              
                <div class="task-card">
                  <h3 class="task-title">Trabajar</h3>
                  <span class="task-category">casa</span>
                  <span class="task-priority medium">Alta</span>
                </div>
              
                <div class="task-card">
                  <h3 class="task-title">Ir al gimnasio</h3>
                  <span class="task-category">Salud</span>
                  <span class="task-priority low">media</span>
                </div>
              </section>
              

        </section>

     </main>

     <div class="layout"></div>
     <main>
        <section class="task-list">
     </main>
     <aside>
        <h2>filtros y categorias</h2>
            <p>Aquí podras filtrar por estado, catrgoria, etc...</p>
     </aside>
</body>
</html>
